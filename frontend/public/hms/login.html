<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMS | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hospital: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50">
  <div class="grid min-h-screen lg:grid-cols-2">
    <section class="hidden bg-gradient-to-br from-hospital-600 to-hospital-800 p-10 text-white lg:flex lg:flex-col lg:justify-between">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">HealthSync HMS</h1>
        <p class="mt-3 text-hospital-100">Modern healthcare workflow experience for the digital age.</p>
      </div>
      <div class="space-y-4 text-sm text-hospital-100">
        <p class="flex items-center gap-2">
          <span class="flex h-6 w-6 items-center justify-center rounded-full bg-white/20">✔</span>
          Secured Patient Portals
        </p>
        <p class="flex items-center gap-2">
          <span class="flex h-6 w-6 items-center justify-center rounded-full bg-white/20">✔</span>
          Real-time Scheduling
        </p>
        <p class="flex items-center gap-2">
          <span class="flex h-6 w-6 items-center justify-center rounded-full bg-white/20">✔</span>
          Intelligent Billing
        </p>
      </div>
    </section>
    
    <section class="flex items-center justify-center p-6">
      <div class="w-full max-w-md rounded-[2.5rem] border border-slate-200 bg-white p-10 shadow-2xl shadow-slate-200/50">
        <div class="mb-8">
          <h2 class="text-3xl font-black text-slate-900">Sign In</h2>
          <p class="mt-2 text-slate-500">Welcome back! Please enter your details.</p>
        </div>
        
        <form class="space-y-6" id="loginForm">
          <div>
            <label for="email" class="mb-2 block text-sm font-semibold text-slate-700">Work Email</label>
            <input id="email" name="email" type="email" 
              class="w-full rounded-2xl border-slate-200 bg-slate-50 px-4 py-3 placeholder-slate-400 transition-all focus:border-hospital-500 focus:bg-white focus:ring-4 focus:ring-hospital-500/10" 
              placeholder="doctor@hospital.com" required />
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
              <a href="/hms/forgot-password.html" class="text-xs font-medium text-hospital-600 hover:text-hospital-700">Forgot?</a>
            </div>
            <input id="password" name="password" type="password" 
              class="w-full rounded-2xl border-slate-200 bg-slate-50 px-4 py-3 transition-all focus:border-hospital-500 focus:bg-white focus:ring-4 focus:ring-hospital-500/10" 
              required />
          </div>
          
          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" class="h-4 w-4 rounded border-slate-300 text-hospital-600 focus:ring-hospital-500" />
            <label for="remember" class="text-sm text-slate-600">Remember for 30 days</label>
          </div>
          
          <button type="submit" 
            class="flex w-full items-center justify-center gap-2 rounded-2xl bg-hospital-600 py-3.5 text-base font-bold text-white transition-all hover:bg-hospital-700 hover:shadow-xl hover:shadow-hospital-200 active:scale-[0.98]">
            Sign In to Portal
          </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-slate-600">
          Not registered? 
          <a href="/hms/register.html" class="font-bold text-hospital-600 hover:text-hospital-700 underline decoration-hospital-200 underline-offset-4">Create an account</a>
        </p>
      </div>
    </section>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (response.ok) {
          window.location.href = '/hms/dashboard-patient.html'; // Simplified for demo
        } else {
          alert('Login failed. Please check credentials.');
        }
      } catch (err) {
        console.error('Login error:', err);
      }
    });
  </script>
</body>
</html>
