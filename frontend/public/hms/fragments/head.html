<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="head(pageTitle)">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} ?: 'HMS Pro'">HMS Pro</title>
    <meta name="description" content="Premium SaaS Hospital Management System - Elevating Healthcare through Design and Data." />
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/hms/assets/hms.css}" href="/hms/assets/hms.css" />
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .sidebar-active { background: rgb(37 99 235 / 0.1); color: rgb(37 99 235); font-weight: 700; border-right: 4px solid rgb(37 99 235); }
        .card-glow:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05), 0 0 15px 0 rgb(37 99 235 / 0.1); transition: all 0.3s ease; }
    </style>
</head>
</html>
