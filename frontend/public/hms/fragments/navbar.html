<nav th:fragment="navbar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="sticky top-0 z-50 border-b border-slate-100 bg-white/80 backdrop-blur-xl">
  <div class="mx-auto flex h-16 w-full max-w-[1600px] items-center justify-between px-4 lg:px-8">
    
    <!-- Left Section -->
    <div class="flex items-center gap-4">
      <button data-sidebar-toggle class="rounded-xl border border-slate-200 p-2.5 text-slate-500 lg:hidden hover:bg-slate-50 transition-all" aria-label="Toggle sidebar">
        <i data-lucide="menu" class="h-5 w-5"></i>
      </button>
      
      <!-- Brand for Mobile -->
      <div class="flex items-center gap-2 lg:hidden">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">H</div>
      </div>

      <!-- Search Bar -->
      <div class="hidden md:flex items-center relative group">
        <i data-lucide="search" class="absolute left-3.5 w-4 h-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
        <input type="text" placeholder="Search patients, appointments..." 
               class="w-80 bg-slate-50 border-transparent rounded-2xl py-2.5 pl-10 pr-4 text-sm font-medium placeholder-slate-400 outline-none transition-all focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/30">
        <kbd class="absolute right-3 px-1.5 py-0.5 rounded border border-slate-200 bg-white text-[10px] font-bold text-slate-400">⌘K</kbd>
      </div>
    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-4">
      <div sec:authorize="isAuthenticated()" class="hidden sm:flex items-center gap-2 mr-2">
        <button class="p-2.5 text-slate-500 hover:bg-slate-50 hover:text-blue-600 rounded-xl transition-all relative">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 border-2 border-white rounded-full"></span>
        </button>
      </div>

      <div class="h-8 w-[1px] bg-slate-100 mx-1 hidden sm:block"></div>

      <!-- Profile Section (Conditional based on Login) -->
      <div class="relative">
        <!-- If Logged In -->
        <button sec:authorize="isAuthenticated()" data-profile-toggle class="flex items-center gap-3 rounded-2xl pl-1 pr-3 py-1 hover:bg-slate-50 border border-transparent transition-all">
          <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold p-[2px] shadow-lg shadow-blue-500/20">
            <img class="h-full w-full rounded-lg object-cover" th:src="${'https://ui-avatars.com/api/?name=' + #authentication.name + '&background=transparent&color=fff'}" alt="User">
          </div>
          <div class="hidden text-left lg:block">
            <p class="text-xs font-bold text-slate-900 leading-tight" sec:authentication="name">User Name</p>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">
                <span sec:authorize="hasRole('ADMIN')">Administrator</span>
                <span sec:authorize="hasRole('DOCTOR')">Medical Doctor</span>
                <span sec:authorize="hasRole('PATIENT')">Patient Portal</span>
                <span sec:authorize="hasRole('NURSE')">Nurse Staff</span>
            </p>
          </div>
          <i data-lucide="chevron-down" class="hidden lg:block w-4 h-4 text-slate-400"></i>
        </button>

        <!-- If NOT Logged In -->
        <div sec:authorize="!isAuthenticated()" class="flex items-center gap-2">
            <a href="/login.html" class="px-5 py-2 text-sm font-bold text-slate-600 hover:text-blue-600 transition-all">Relogin</a>
            <a href="/register.html" class="px-5 py-2 text-sm font-bold text-white bg-blue-600 rounded-xl shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all">Join Portal</a>
        </div>
        
        <!-- Dropdown Menu -->
        <div sec:authorize="isAuthenticated()" data-profile-menu class="absolute right-0 mt-3 hidden w-56 rounded-2xl border border-slate-100 bg-white p-2 shadow-2xl shadow-slate-200/50 transition-all">
            <div class="px-3 py-2 border-b border-slate-50 mb-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Portal Account</p>
            </div>
            <a href="#" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all">
                <i data-lucide="user" class="w-4 h-4"></i>
                <span>Account Profile</span>
            </a>
            <div class="my-2 border-t border-slate-50"></div>
            <a href="/logout" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 transition-all">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Sign Out Securely</span>
            </a>
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</nav>
