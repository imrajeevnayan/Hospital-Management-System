<aside th:fragment="sidebar(activeMenu,role)" data-sidebar class="fixed inset-y-0 left-0 z-40 w-72 -translate-x-full border-r border-slate-100 bg-white p-6 transition-transform duration-300 lg:translate-x-0">
  <div class="flex items-center gap-3 mb-10 px-2 lg:hidden">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">H</div>
    <span class="text-lg font-extrabold tracking-tight text-slate-900">HMS <span class="text-blue-600">Pro</span></span>
  </div>

  <div class="space-y-6">
    <div>
      <p class="px-3 mb-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Core Portal</p>
      <nav class="space-y-1.5">
        <a th:href="@{/dashboard}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:classappend="${activeMenu == 'dashboard'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="layout-grid" class="w-5 h-5"></i>
           <span>Overview</span>
        </a>
        <a th:href="@{/appointments}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:classappend="${activeMenu == 'appointments'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="calendar" class="w-5 h-5"></i>
           <span>Schedule</span>
        </a>
      </nav>
    </div>

    <div th:if="${role != 'PATIENT'}">
      <p class="px-3 mb-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Clinical Management</p>
      <nav class="space-y-1.5">
        <a th:href="@{/patients}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:classappend="${activeMenu == 'patients'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="users" class="w-5 h-5"></i>
           <span>Patient Registry</span>
        </a>
        <a th:href="@{/medical-records}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:if="${role == 'DOCTOR' or role == 'NURSE'}"
           th:classappend="${activeMenu == 'records'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="file-text" class="w-5 h-5"></i>
           <span>Medical Records</span>
        </a>
        <a th:href="@{/prescriptions}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:if="${role == 'DOCTOR'}"
           th:classappend="${activeMenu == 'prescriptions'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="pill" class="w-5 h-5"></i>
           <span>Prescriptions</span>
        </a>
      </nav>
    </div>

    <div>
      <p class="px-3 mb-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Administrative</p>
      <nav class="space-y-1.5">
        <a th:href="@{/billing}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:if="${role == 'ADMIN' or role == 'PATIENT'}"
           th:classappend="${activeMenu == 'billing'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="credit-card" class="w-5 h-5"></i>
           <span>Financials</span>
        </a>
        <a th:href="@{/admin/users}" class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all" 
           th:if="${role == 'ADMIN'}"
           th:classappend="${activeMenu == 'admin-users'} ? 'bg-blue-600/10 text-blue-700' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'">
           <i data-lucide="shield-check" class="w-5 h-5"></i>
           <span>Staff Access</span>
        </a>
      </nav>
    </div>
  </div>

  <div class="absolute bottom-6 left-6 right-6">
    <div class="rounded-3xl bg-slate-900 p-5 text-white overflow-hidden relative group">
      <div class="absolute -top-4 -right-4 w-20 h-20 bg-blue-500/20 rounded-full blur-2xl group-hover:bg-blue-500/40 transition-all"></div>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">System Load</p>
      <p class="text-lg font-bold">Stable</p>
      <div class="mt-4 flex flex-col gap-2">
        <div class="flex justify-between text-[10px] font-bold">
            <span class="text-slate-400">CPU Usage</span>
            <span class="text-emerald-400">12%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full w-12/12 bg-blue-500"></div>
        </div>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</aside>
