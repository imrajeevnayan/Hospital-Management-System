<aside th:fragment="sidebar(activeMenu,role)" data-sidebar class="fixed inset-y-0 left-0 z-30 mt-16 w-72 -translate-x-full border-r border-slate-200 bg-white p-4 transition-transform duration-200 lg:translate-x-0">
  <nav class="space-y-1 text-sm">
    <a th:href="@{/dashboard}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:classappend="${activeMenu == 'dashboard'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>🏠</span><span>Dashboard</span></a>
    <a th:href="@{/appointments}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:classappend="${activeMenu == 'appointments'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>📅</span><span>Appointments</span></a>
    <a th:href="@{/patients}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:if="${role != 'PATIENT'}" th:classappend="${activeMenu == 'patients'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>👥</span><span>Patients</span></a>
    <a th:href="@{/medical-records}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:if="${role == 'DOCTOR' or role == 'NURSE'}" th:classappend="${activeMenu == 'records'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>🧾</span><span>Medical Records</span></a>
    <a th:href="@{/prescriptions}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:if="${role == 'DOCTOR' or role == 'PATIENT'}" th:classappend="${activeMenu == 'prescriptions'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>💊</span><span>Prescriptions</span></a>
    <a th:href="@{/billing}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:if="${role == 'ADMIN' or role == 'PATIENT'}" th:classappend="${activeMenu == 'billing'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>💰</span><span>Billing</span></a>
    <a th:href="@{/admin/users}" class="sidebar-item flex items-center gap-3 rounded-xl px-3 py-2.5" th:if="${role == 'ADMIN'}" th:classappend="${activeMenu == 'admin-users'} ? ' bg-blue-50 text-blue-700 font-semibold' : ' text-slate-600 hover:bg-slate-100'"><span>🛡️</span><span>User Management</span></a>
  </nav>
  <div class="mt-8 rounded-2xl bg-slate-50 p-4">
    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">System Health</p>
    <p class="mt-1 text-sm font-semibold text-slate-800">All services operational</p>
    <div class="mt-3 h-2 rounded-full bg-slate-200"><div class="h-2 w-11/12 rounded-full bg-emerald-500"></div></div>
  </div>
</aside>
