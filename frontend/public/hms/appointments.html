<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{hms/fragments/head :: head(${pageTitle})}"></head>
<body class="min-h-screen text-slate-900">
  <header th:replace="~{hms/fragments/navbar :: navbar}"></header>
  <div class="mx-auto flex max-w-[1600px]">
    <div th:replace="~{hms/fragments/sidebar :: sidebar(${activeMenu}, ${role})}"></div>
    <main class="min-h-[calc(100vh-4rem)] w-full p-4 pt-6 lg:ml-72 lg:p-6">
      <section class="mb-6 flex flex-wrap items-start justify-between gap-4">
        <div><p class="text-sm text-slate-500">Home / Appointments</p><h1 class="mt-1 text-2xl font-bold tracking-tight">Appointment Management</h1></div>
        <button data-modal-open="appointment-modal" class="btn-primary">Book/Edit Appointment</button>
      </section>
      <section class="grid gap-4 lg:grid-cols-3">
        <article class="panel hms-shadow p-5 lg:col-span-2" data-calendar-root data-calendar-initial-view="month" data-calendar-week-start="1">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <h3 class="font-semibold">Calendar</h3>
            <div class="flex flex-wrap items-center gap-2">
              <div class="rounded-xl border border-slate-200 bg-white p-1 text-sm">
                <button type="button" class="tab-btn rounded-lg px-3 py-1" data-calendar-view-btn="month" data-active="true">Month</button>
                <button type="button" class="tab-btn rounded-lg px-3 py-1" data-calendar-view-btn="week" data-active="false">Week</button>
              </div>
              <button type="button" class="btn-ghost px-3 py-1" data-calendar-nav="prev" aria-label="Previous period">←</button>
              <p class="min-w-40 text-center text-sm text-slate-500" data-calendar-label>April 2026</p>
              <button type="button" class="btn-ghost px-3 py-1" data-calendar-nav="next" aria-label="Next period">→</button>
            </div>
          </div>
          <div class="mt-4 grid grid-cols-7 gap-2 text-xs text-slate-500" data-weekdays-row></div>
          <div class="mt-2 grid grid-cols-7 gap-2 text-sm" data-calendar-grid></div>
        </article>
        <article class="panel hms-shadow p-5"><h3 class="font-semibold">Time Slots</h3><div class="mt-4 grid grid-cols-2 gap-2 text-sm"><button class="slot-btn rounded-xl border border-slate-200 p-2" data-time-slot data-slot="09:00">09:00</button><button class="slot-btn rounded-xl border border-slate-200 p-2" data-time-slot data-slot="09:30">09:30</button><button class="slot-btn rounded-xl border border-slate-200 p-2" data-time-slot data-slot="10:00">10:00</button><button class="slot-btn rounded-xl border border-slate-200 p-2" data-time-slot data-slot="10:30">10:30</button></div><div class="mt-4 space-y-2"><p><span class="badge badge-pending">Pending</span></p><p><span class="badge badge-confirmed">Confirmed</span></p><p><span class="badge badge-completed">Completed</span></p><p><span class="badge badge-cancelled">Cancelled</span></p></div></article>
      </section>
      <div id="appointment-modal" data-modal class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 p-4"><div class="w-full max-w-xl rounded-2xl bg-white p-6"><div class="flex items-center justify-between"><h3 class="text-lg font-semibold">Book/Edit Appointment</h3><button data-modal-close class="text-slate-500">✕</button></div><form class="mt-4 grid gap-3 sm:grid-cols-2" id="appointmentForm" data-validate-form="true"><input id="patientName" class="input-shell" placeholder="Patient Name" data-required="true" /><input id="doctorName" class="input-shell" placeholder="Doctor Name" data-required="true" /><input id="date" name="appointmentDate" type="date" class="input-shell" data-required="true" data-th-bind-field="appointmentDate" /><input id="time" type="time" class="input-shell" data-required="true" /><select id="status" class="input-shell sm:col-span-2"><option>Pending</option><option>Confirmed</option><option>Completed</option><option>Cancelled</option></select><input type="hidden" name="calendarView" data-calendar-bind="view" data-th-bind-field="calendarView" /><input type="hidden" name="calendarPeriodStart" data-calendar-bind="periodStart" data-th-bind-field="calendarPeriodStart" /><input type="hidden" name="calendarPeriodEnd" data-calendar-bind="periodEnd" data-th-bind-field="calendarPeriodEnd" /><p class="hidden text-xs text-red-500" data-error-for="patientName">Patient is required.</p><p class="hidden text-xs text-red-500" data-error-for="doctorName">Doctor is required.</p><p class="hidden text-xs text-red-500" data-error-for="date">Date is required.</p><p class="hidden text-xs text-red-500" data-error-for="time">Time is required.</p><div class="sm:col-span-2 flex justify-end gap-2"><button type="button" data-modal-close class="btn-ghost">Cancel</button><button type="submit" class="btn-primary">Save</button></div></form></div></div>

    </main>
  </div>
  <div class="toast" data-toast></div>
  <script th:src="@{/hms/assets/hms.js}" src="/hms/assets/hms.js"></script>
</body>
</html>
