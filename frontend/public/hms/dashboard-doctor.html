<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{hms/fragments/head :: head(${pageTitle})}"></head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header th:replace="~{hms/fragments/navbar :: navbar}"></header>
  <div class="mx-auto flex max-w-[1600px]">
    <div th:replace="~{hms/fragments/sidebar :: sidebar(${activeMenu}, ${role})}"></div>
    <main class="min-h-[calc(100vh-4rem)] w-full p-4 pt-6 lg:ml-72 lg:p-6">
      <section class="mb-6 flex flex-wrap items-start justify-between gap-4">
        <div>
          <p class="text-sm text-slate-500">Home / Dashboard / Doctor</p>
          <h1 class="mt-1 text-2xl font-bold tracking-tight text-slate-900">Doctor Dashboard</h1>
        </div>
        <div class="flex flex-wrap items-center gap-2"><button class="rounded-xl border border-slate-300 px-4 py-2 text-sm">Add Medical Record</button><button class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white">Write Prescription</button></div>
      </section>
      <section class="grid gap-4 lg:grid-cols-3">
  <article class="rounded-2xl border border-slate-200 bg-white p-5 lg:col-span-2"><h3 class="text-base font-semibold">Today’s Appointments</h3><div class="mt-4 overflow-x-auto"><table class="min-w-full text-sm"><thead><tr class="text-left text-slate-500"><th class="pb-3">Patient</th><th class="pb-3">Time</th><th class="pb-3">Status</th></tr></thead><tbody class="divide-y divide-slate-100"><tr><td class="py-3">John Carter</td><td>09:30 AM</td><td><span class="badge badge-confirmed">Confirmed</span></td></tr><tr><td class="py-3">Maya Lin</td><td>11:00 AM</td><td><span class="badge badge-pending">Pending</span></td></tr><tr><td class="py-3">Oscar Reed</td><td>03:45 PM</td><td><span class="badge badge-completed">Completed</span></td></tr></tbody></table></div></article>
  <article class="rounded-2xl border border-slate-200 bg-white p-5"><h3 class="text-base font-semibold">Patient Queue</h3><ul class="mt-4 space-y-2 text-sm"><li class="flex items-center justify-between rounded-xl bg-slate-50 p-3"><span>Queue #01</span><span>Chest pain</span></li><li class="flex items-center justify-between rounded-xl bg-slate-50 p-3"><span>Queue #02</span><span>Follow-up</span></li><li class="flex items-center justify-between rounded-xl bg-slate-50 p-3"><span>Queue #03</span><span>Lab review</span></li></ul></article>
</section>
    </main>
  </div>
  <script th:src="@{/hms/assets/hms.js}" src="/hms/assets/hms.js"></script>
</body>
</html>
